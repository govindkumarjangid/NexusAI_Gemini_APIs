<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="256" cy="256" r="256" fill="#24A5FF" fill-opacity="0.15"/>
  <defs>
    <linearGradient id="nexus_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24A5FF" />
      <stop offset="1" stop-color="#7000FF" stop-opacity="0.6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <circle cx="256" cy="256" r="60" fill="url(#nexus_grad)" filter="url(#glow)">
    <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite" />
  </circle>

  <path d="M120 400L120 112L392 400L392 112" stroke="url(#nexus_grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <animate attributeName="stroke-dasharray" from="0,1000" to="1000,0" dur="2s" fill="freeze" />
  </path>

  <circle cx="120" cy="112" r="12" fill="white" />
  <circle cx="120" cy="400" r="12" fill="white" />
  <circle cx="392" cy="112" r="12" fill="white" />
  <circle cx="392" cy="400" r="12" fill="white" />

  <circle cx="256" cy="256" r="180" stroke="url(#nexus_grad)" stroke-width="2" stroke-dasharray="10 20" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite" />
  </circle>
  <circle cx="256" cy="256" r="220" stroke="url(#nexus_grad)" stroke-width="1" stroke-dasharray="5 15" opacity="0.2">
    <animateTransform attributeName="transform" type="rotate" from="360 256 256" to="0 256 256" dur="30s" repeatCount="indefinite" />
  </circle>
</svg>
